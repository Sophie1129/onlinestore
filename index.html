<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Breeze Stationery</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#eef5ff;
  color:#333;
}

header{
  background:linear-gradient(135deg,#8cbcff,#cfe4ff);
  text-align:center;
  padding:60px 20px;
  color:#12457a;
}

header h1{ font-size:50px; }
header p{ font-size:18px; }

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
  padding:40px 0;
}

.section-title{
  text-align:center;
  font-size:34px;
  margin-bottom:25px;
  color:#1c4e8f;
}

#searchInput{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:none;
  margin-bottom:30px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.product-card{
  background:white;
  border-radius:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  overflow:hidden;
  transition:0.3s;
}

.product-card:hover{
  transform:translateY(-6px);
}

.product-card img{
  width:100%;
  height:240px;
  object-fit:contain;
  background:#f8fbff;
  padding:15px;
}

.product-content{
  padding:18px;
  text-align:center;
}

.price{
  font-size:26px;
  color:#4f83d1;
  font-weight:bold;
}

.quantity-box{
  margin-top:10px;
}

input, select{
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
  text-align:center;
}

button{
  margin-top:12px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#6ea8ff;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#4f8df0;
}

.cart-box, .checkout{
  background:white;
  margin-top:40px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

footer{
  text-align:center;
  padding:20px;
  margin-top:40px;
  background:#dcecff;
}
</style>
</head>

<body>

<header>
<h1>Blue Breeze Stationery</h1>
<p>Cute and Useful School Supplies ✏️</p>
</header>

<div class="container">

<h2 class="section-title">Our Products</h2>

<input type="text" id="searchInput" placeholder="Search..." onkeyup="searchProducts()">

<div class="products">

<!-- Correction Tape -->
<div class="product-card">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Correction_tape.jpg/640px-Correction_tape.jpg">

<div class="product-content">
<h3>Correction Tape</h3>
<p class="price">NT$20</p>

<input type="number" id="qty1" value="1" min="1">

<button onclick="addToCart('Correction Tape',20,'qty1')">
Add to Cart
</button>
</div>
</div>

<!-- Highlighter -->
<div class="product-card">
<img src="/mnt/data/4e57ac84-c280-4ee5-84a6-e196470dacde.png">

<div class="product-content">
<h3>Highlighter</h3>
<p class="price">NT$15</p>

<input type="number" id="qty2" value="1" min="1">

<select id="color2">
  <option>Yellow</option>
  <option>Blue</option>
  <option>Pink</option>
  <option>Green</option>
  <option>Orange</option>
</select>

<button onclick="addToCart('Highlighter',15,'qty2','color2')">
Add to Cart
</button>
</div>
</div>

<!-- Eraser -->
<div class="product-card">
<img src="/mnt/data/f7150c31-6fca-4d84-ab2a-770a136fee13.png">

<div class="product-content">
<h3>Eraser</h3>
<p class="price">NT$12</p>

<input type="number" id="qty3" value="1" min="1">

<button onclick="addToCart('Eraser',12,'qty3')">
Add to Cart
</button>
</div>
</div>

</div>

<!-- CART -->
<div class="cart-box">
<h2>Shopping Cart</h2>
<p>Items: <span id="cart-count">0</span></p>
<ul id="cart-items"></ul>
<h3>Total: NT$ <span id="total-price">0</span></h3>

<button onclick="clearCart()">Clear Cart</button>
</div>

<!-- CHECKOUT -->
<div class="checkout">
<h2>Checkout</h2>

<form action="https://formspree.io/f/maqkkyno" method="POST" onsubmit="updateCartSummary()">

<input type="hidden" name="cart_summary" id="cart-summary">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Message"></textarea>

<button type="submit">Place Order</button>

</form>
</div>

</div>

<footer>
Good Stationery, Better Learning 💙
</footer>

<script>

let cartCount = 0;
let totalPrice = 0;

function addToCart(name, price, qtyId, colorId=null){

  let qty = parseInt(document.getElementById(qtyId).value);

  let color = "";

  if(colorId){
    color = " (" + document.getElementById(colorId).value + ")";
  }

  cartCount += qty;
  totalPrice += price * qty;

  document.getElementById("cart-count").innerText = cartCount;
  document.getElementById("total-price").innerText = totalPrice;

  let li = document.createElement("li");
  li.innerText = `${name}${color} x ${qty} - NT$${price * qty}`;

  document.getElementById("cart-items").appendChild(li);
}

function clearCart(){
  cartCount = 0;
  totalPrice = 0;
  document.getElementById("cart-count").innerText = 0;
  document.getElementById("total-price").innerText = 0;
  document.getElementById("cart-items").innerHTML = "";
}

function searchProducts(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.getElementsByClassName("product-card");

  for(let c of cards){
    c.style.display = c.innerText.toLowerCase().includes(input) ? "" : "none";
  }
}

function updateCartSummary(){
  document.getElementById("cart-summary").value =
    document.getElementById("cart-items").innerText +
    "\nTotal: NT$" + totalPrice;
}

</script>

</body>
</html>
