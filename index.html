
<!-- PRODUCTS -->
<div class="products">

  <!-- Product 1 -->
  <div class="product-card">

    <img src="https://images.unsplash.com/photo-1586075010923-2dd4570fb338?q=80&w=1000&auto=format&fit=crop" alt="Correction Tape">

    <h2>Correction Tape</h2>

    <p class="price">$3.99</p>

    <p>
      Smooth and easy-to-use correction tape for school and office work.
    </p>

    <button onclick="addToCart('Correction Tape', 3.99)">
      Add to Cart
    </button>

  </div>

  <!-- Product 2 -->
  <div class="product-card">

    <img src="https://images.unsplash.com/photo-1517842645767-c639042777db?q=80&w=1000&auto=format&fit=crop" alt="Highlighter Pen">

    <h2>Highlighter Pen</h2>

    <p class="price">$2.49</p>

    <p>
      Bright colorful highlighters perfect for notes and studying.
    </p>

    <button onclick="addToCart('Highlighter Pen', 2.49)">
      Add to Cart
    </button>

  </div>

</div>

<!-- CART -->
<div class="order-section">

  <h2>Shopping Cart</h2>

  <p>
    Items in Cart:
    <span id="cart-count">0</span>
  </p>

  <br>

  <ul id="cart-items"></ul>

  <br>

  <h3>
    Total: $
    <span id="total-price">0.00</span>
  </h3>

</div>

<!-- CHECKOUT FORM -->
<div class="order-section">

  <h2>Checkout</h2>

  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

    <input
      type="text"
      name="customer_name"
      placeholder="Enter your name"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Enter your email"
      required
    >

    <textarea
      name="message"
      rows="5"
      placeholder="Write your order here"
    ></textarea>

    <button type="submit">
      Checkout
    </button>

  </form>

</div>

<!-- JAVASCRIPT -->
<script>

  let cartCount = 0;
  let totalPrice = 0;

  function addToCart(productName, productPrice)
  {
    cartCount++;

    totalPrice += productPrice;

    document.getElementById("cart-count").innerText = cartCount;

    document.getElementById("total-price").innerText = totalPrice.toFixed(2);

    let cartItems = document.getElementById("cart-items");

    let li = document.createElement("li");

    li.innerText = productName + " - $" + productPrice;

    cartItems.appendChild(li);
  }

</script>
```

Also add this CSS inside your `<style>` section:

```css
button{
  background:#4a90e2;
  color:white;
  border:none;
  padding:12px;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#357abd;
}

#cart-items{
  margin-left:20px;
}
```

Now your store has:

* Shopping cart
* Cart counter
* Checkout button
* Total price counter
* Real online store feeling 😄
