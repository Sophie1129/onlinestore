<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>writing tools Online Store</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      color:#333;
    }

    header{
      background:#222;
      color:white;
      padding:20px;
      text-align:center;
    }

    header h1{
      margin-bottom:10px;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
      padding:20px 0;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .product{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
      text-align:center;
    }

    .product img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:10px;
    }

    .product h3{
      margin:15px 0 10px;
    }

    .price{
      color:green;
      font-size:20px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .order-section{
      background:white;
      margin-top:40px;
      padding:30px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .order-section h2{
      margin-bottom:20px;
      text-align:center;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    input, textarea, select{
      padding:12px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:16px;
    }

    button{
      padding:12px;
      border:none;
      background:#222;
      color:white;
      font-size:16px;
      border-radius:5px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#444;
    }

    footer{
      text-align:center;
      padding:20px;
      margin-top:30px;
      background:#222;
      color:white;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Online Store</h1>
    <p>Welcome to our simple shopping website</p>
  </header>

  <div class="container">

    <h2>Our Products</h2>

    <div class="products">

      <div class="product">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800&auto=format&fit=crop" alt="Shoes">
        <h3>Running Shoes</h3>
        <p class="price">$59.99</p>
        <p>Comfortable and stylish running shoes.</p>
      </div>

      <div class="product">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=800&auto=format&fit=crop" alt="Watch">
        <h3>Smart Watch</h3>
        <p class="price">$89.99</p>
        <p>Modern smartwatch with fitness tracking.</p>
      </div>

    </div>

    <!-- ORDER FORM -->
    <div class="order-section">

      <h2>Place Your Order</h2>

      <!--
        Replace YOUR_FORMSPREE_LINK with your own Formspree link
      -->

      <form action="https://formspree.io/f/YOUR_FORMSPREE_LINK" method="POST">

        <input type="text" name="customer_name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <select name="product_name" required>
          <option value="">Select Product</option>
          <option value="Running Shoes">Running Shoes</option>
          <option value="Smart Watch">Smart Watch</option>
        </select>

        <input type="number" name="quantity" placeholder="Quantity" min="1" required>

        <textarea name="message" rows="5" placeholder="Additional Message"></textarea>

        <button type="submit">Send Order</button>

      </form>

    </div>

  </div>

  <footer>
    <p>© 2026 My Online Store | Beginner Project</p>
  </footer>

</body>
</html>
